
networks:
  dev-network:
    driver: bridge
  kafka-network:
    driver: bridge
  monitoring-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:
  mongo-data:
  kafka-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:

services:
  # ============================================
  # Project Services
  # ============================================
  qr-pdf-service:
    build:
      context: /mnt/e/development/projects/qr-pdf-service
    container_name: qr-pdf-service
    env_file:
      - /mnt/e/development/infrastructure/secrets/.env.qr-pdf-service
    ports:
      - "8250:8250"
    volumes:
      - /mnt/e/development/projects/qr-pdf-service:/app
    networks:
      - dev-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ============================================
  # MINIMAL PROFILE - PostgreSQL + Redis
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: dev-pgadmin
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - dev-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: '0.5'

  redis-commander:
    image: rediscommander/redis-commander:0.8.0
    container_name: dev-redis-commander
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    environment:
      REDIS_HOSTS: local:dev-redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "8082:8081"
    networks:
      - dev-network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # ============================================
  # BACKEND PROFILE - MongoDB + Kafka (KRaft)
  # ============================================

  mongodb:
    image: mongo:7.0
    container_name: dev-mongo
    profiles: ["backend", "fullstack"]
    restart: "no"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - dev-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  mongo-express:
    image: mongo-express:1.0.2
    container_name: dev-mongo-express
    profiles: ["backend", "fullstack"]
    restart: "no"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@dev-mongo:27017/
      ME_CONFIG_BASICAUTH: true
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - dev-network
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  # Kafka in KRaft mode — no Zookeeper required
  # CLUSTER_ID generated with: kafka-storage random-uuid
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: dev-kafka
    profiles: ["backend", "fullstack"]
    restart: "no"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@dev-kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: vC34CxBBQZ-BypHIyYCJzg
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: dev-kafka-ui
    profiles: ["backend", "fullstack"]
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: dev-kafka:9092
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: '0.5'

  # ============================================
  # FULLSTACK PROFILE - Elasticsearch + Nginx
  # ============================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dev-elasticsearch
    profiles: ["fullstack"]
    restart: "no"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: dev-kibana
    profiles: ["fullstack"]
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://dev-elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - dev-network
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  nginx:
    image: nginx:1.27-alpine
    container_name: dev-nginx
    profiles: ["fullstack"]
    restart: "no"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dev-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  # ============================================
  # MONITORING PROFILE - Prometheus + Grafana
  # ============================================

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dev-prometheus
    profiles: ["monitoring"]
    restart: "no"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - /mnt/e/development/infrastructure/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  grafana:
    image: grafana/grafana:11.1.0
    container_name: dev-grafana
    profiles: ["monitoring"]
    restart: "no"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - monitoring-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: dev-node-exporter
    profiles: ["monitoring"]
    restart: "no"
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dev-cadvisor
    profiles: ["monitoring"]
    restart: "no"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8085:8080"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
