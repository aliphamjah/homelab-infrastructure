
networks:
  dev-network:
    driver: bridge
  kafka-network:
    driver: bridge
  monitoring-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:
  mongo-data:
  kafka-data:
  zookeeper-data:
  elasticsearch-data:

services:
  # ============================================
  # MINIMAL PROFILE - PostgreSQL + Redis
  # ============================================
  
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homelab
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    command: redis-server --requirepass homelab_redis_2025
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "homelab_redis_2025", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev-pgadmin
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@homelab.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - dev-network
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dev-redis-commander
    profiles: ["minimal", "backend", "fullstack"]
    restart: "no"
    environment:
      REDIS_HOSTS: local:dev-redis:6379:0:homelab_redis_2025
    ports:
      - "8082:8081"
    networks:
      - dev-network
    depends_on:
      - redis

  # ============================================
  # BACKEND PROFILE - MongoDB + Kafka
  # ============================================

  mongodb:
    image: mongo:7
    container_name: dev-mongo
    profiles: ["backend", "fullstack"]
    restart: "no"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: homelab_mongo_2025
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - dev-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: dev-mongo-express
    profiles: ["backend", "fullstack"]
    restart: "no"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: homelab_mongo_2025
      ME_CONFIG_MONGODB_URL: mongodb://admin:homelab_mongo_2025@dev-mongo:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    networks:
      - dev-network
    depends_on:
      - mongodb

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: dev-zookeeper
    profiles: ["backend", "fullstack"]
    restart: "no"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - kafka-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: dev-kafka
    profiles: ["backend", "fullstack"]
    restart: "no"
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: dev-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dev-kafka-ui
    profiles: ["backend", "fullstack"]
    restart: "no"
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: dev-kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: dev-zookeeper:2181
    networks:
      - kafka-network

  # ============================================
  # FULLSTACK PROFILE - Elasticsearch + Nginx
  # ============================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dev-elasticsearch
    profiles: ["fullstack"]
    restart: "no"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: dev-kibana
    profiles: ["fullstack"]
    restart: "no"
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://dev-elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - dev-network

  nginx:
    image: nginx:alpine
    container_name: dev-nginx
    profiles: ["fullstack"]
    restart: "no"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dev-network
